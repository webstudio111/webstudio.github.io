<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Demo — AI Receptionist</title>
<style>
  :root {
    --brand: #0ea5e9;
    --bg: #0c0f16;
    --card: #141927;
    --line: rgba(255,255,255,0.08);
    --text: #e8ecf6;
    --dim: #8a93ab;
    --green: #22c55e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Inter, sans-serif;
    min-height: 100vh;
  }
  /* ---------- top bar ---------- */
  #topbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 20px;
    background: rgba(20,25,39,0.9);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(10px);
  }
  #topbar .live {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--green);
  }
  #topbar .live::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.3; } }
  #topbar .title { font-size: 13px; color: var(--dim); }
  #topbar .title b { color: var(--text); }
  #hoursToggle {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--dim); cursor: pointer;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    padding: 7px 12px; border-radius: 20px;
    user-select: none;
  }
  #hoursToggle.night { color: #c4b5fd; border-color: rgba(196,181,253,0.4); }
  /* ---------- layout ---------- */
  #stage {
    display: grid;
    grid-template-columns: minmax(340px, 420px) minmax(320px, 460px);
    gap: 40px;
    justify-content: center;
    align-items: start;
    padding: 36px 20px 60px;
  }
  /* ---------- phone mockup ---------- */
  #phone {
    background: #1a1f2e;
    border-radius: 38px;
    padding: 12px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
    position: sticky; top: 80px;
  }
  #phone .notch {
    width: 110px; height: 22px; background: #0c0f16;
    border-radius: 0 0 14px 14px; margin: 0 auto 6px;
  }
  #screen {
    background: #f4f6fa;
    border-radius: 28px;
    height: 640px;
    overflow: hidden;
    position: relative;
    color: #1a2233;
  }
  /* fake client website inside phone */
  #site { height: 100%; overflow-y: auto; }
  #site .hero {
    background: linear-gradient(135deg, var(--brand), color-mix(in srgb, var(--brand) 60%, #1a2233));
    color: #fff; padding: 34px 22px 28px;
  }
  #site .hero .logo {
    width: 46px; height: 46px; border-radius: 12px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; margin-bottom: 14px;
  }
  #site .hero h1 { font-size: 22px; line-height: 1.2; }
  #site .hero p { font-size: 12.5px; opacity: 0.85; margin-top: 7px; }
  #site section { padding: 18px 22px 6px; }
  #site h3 { font-size: 11px; letter-spacing: 2px; color: #76819c; text-transform: uppercase; margin-bottom: 10px; }
  .svc {
    display: flex; justify-content: space-between; font-size: 13.5px;
    padding: 9px 0; border-bottom: 1px solid #e4e8f0;
  }
  .svc b { font-weight: 600; }
  .svc span { color: #76819c; }
  .meta { font-size: 13px; color: #4a5468; line-height: 1.8; padding-bottom: 80px; }
  /* chat bubble + window */
  #chatFab {
    position: absolute; right: 14px; bottom: 14px;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--brand); border: none; cursor: pointer;
    box-shadow: 0 8px 24px color-mix(in srgb, var(--brand) 50%, transparent);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    transition: transform 0.15s;
  }
  #chatFab:hover { transform: scale(1.07); }
  #chatFab svg { width: 26px; height: 26px; fill: #fff; }
  #chatWin {
    position: absolute; inset: 10px;
    background: #fff; border-radius: 22px;
    box-shadow: 0 20px 60px rgba(10,20,40,0.25);
    display: flex; flex-direction: column;
    z-index: 6;
    transform: translateY(110%);
    transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
  }
  #chatWin.open { transform: translateY(0); }
  #chatHead {
    background: var(--brand); color: #fff;
    padding: 14px 16px; border-radius: 22px 22px 0 0;
    display: flex; align-items: center; gap: 11px;
  }
  #chatHead .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center; font-size: 17px;
  }
  #chatHead .who { flex: 1; }
  #chatHead .who b { font-size: 14px; display: block; }
  #chatHead .who span { font-size: 11px; opacity: 0.85; display: flex; align-items: center; gap: 5px; }
  #chatHead .who span::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }
  #chatClose { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; opacity: 0.8; }
  #msgs {
    flex: 1; overflow-y: auto; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 8px;
    background: #f7f9fc;
  }
  .msg {
    max-width: 82%; padding: 9px 13px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.45;
    animation: pop 0.25s ease-out;
    white-space: pre-line;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(0.97); } }
  .msg.bot { background: #fff; border: 1px solid #e4e8f0; align-self: flex-start; border-bottom-left-radius: 5px; color: #1a2233; }
  .msg.user { background: var(--brand); color: #fff; align-self: flex-end; border-bottom-right-radius: 5px; }
  .typing { display: inline-flex; gap: 4px; padding: 13px 14px; }
  .typing i {
    width: 7px; height: 7px; border-radius: 50%; background: #aab4c8;
    animation: bob 1s infinite;
  }
  .typing i:nth-child(2) { animation-delay: 0.15s; }
  .typing i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bob { 30% { transform: translateY(-5px); } }
  #quick {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px 4px;
    background: #f7f9fc;
  }
  #quick button {
    border: 1.5px solid var(--brand); color: var(--brand);
    background: #fff; font-size: 12px; font-weight: 600;
    padding: 7px 12px; border-radius: 16px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    animation: pop 0.3s ease-out;
  }
  #quick button:hover { background: var(--brand); color: #fff; }
  #inputRow {
    display: flex; gap: 8px; padding: 10px 12px 12px;
    background: #f7f9fc; border-radius: 0 0 22px 22px;
  }
  #inputRow input {
    flex: 1; border: 1.5px solid #dde3ee; border-radius: 20px;
    padding: 10px 15px; font-size: 13.5px; outline: none;
    background: #fff; color: #1a2233;
  }
  #inputRow input:focus { border-color: var(--brand); }
  #send {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--brand); border: none; cursor: pointer; color: #fff;
    font-size: 16px;
  }
  /* ---------- owner panel ---------- */
  #ownerPanel { display: flex; flex-direction: column; gap: 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
  }
  .card h2 {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--dim); margin-bottom: 12px;
  }
  #ownerIntro { font-size: 14px; line-height: 1.65; color: #b9c2d8; }
  #ownerIntro b { color: var(--text); }
  #statRow { display: flex; gap: 12px; margin-top: 14px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.04);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 12px; text-align: center;
  }
  .stat .n { font-size: 22px; font-weight: 800; color: var(--green); font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 9.5px; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; margin-top: 3px; }
  #leadFeed { display: flex; flex-direction: column; gap: 10px; min-height: 70px; }
  .lead-empty { font-size: 13px; color: var(--dim); font-style: italic; }
  .lead {
    background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04));
    border: 1px solid rgba(34,197,94,0.35);
    border-radius: 14px; padding: 13px 15px;
    font-size: 13px; line-height: 1.55;
    animation: leadIn 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.4);
  }
  @keyframes leadIn { from { opacity: 0; transform: translateX(30px); } }
  .lead .tag {
    font-size: 9.5px; font-weight: 800; letter-spacing: 1.5px;
    color: var(--green); display: block; margin-bottom: 4px;
  }
  .lead b { color: #fff; }
  .facts { font-size: 13px; line-height: 1.75; color: #b9c2d8; }
  .facts b { color: #ffd166; }
  #cta {
    background: linear-gradient(135deg, color-mix(in srgb, var(--brand) 25%, #141927), #141927);
    border-color: color-mix(in srgb, var(--brand) 45%, transparent);
  }
  #cta p { font-size: 14px; line-height: 1.6; color: #cdd6ea; margin-bottom: 14px; }
  #cta p b { color: #fff; }
  #cta a {
    display: inline-block; text-decoration: none;
    background: var(--brand); color: #fff; font-weight: 700; font-size: 14px;
    padding: 12px 22px; border-radius: 10px;
    transition: filter 0.15s;
  }
  #cta a:hover { filter: brightness(1.15); }
  @media (max-width: 860px) {
    #stage { grid-template-columns: minmax(300px, 420px); }
    #phone { position: static; }
  }
</style>
</head>

  lang: 'ro',
  biz: 'Clinica Dentară Zâmbet',
  tag: 'Stomatologie pentru toată familia — blând, modern, fără durere',
  owner: 'Dr. Ionescu',
  phone: '0722 123 456',
  addr: 'Str. Mihai Eminescu 24, București',
  hours: 'Lun–Vin 9:00–19:00 · Sâm 9:00–13:00',
  color: '#0ea5e9',
  services: [
    { n: 'Consult + plan de tratament', p: '150 RON' },
    { n: 'Detartraj + periaj profesional', p: '250 RON' },
    { n: 'Albire profesională', p: '900 RON' },

  ],
  faqs: [
    { q: 'Lucrați cu casa de asigurări?', a: 'Da, avem contract cu CAS pentru anumite servicii, iar pentru rest emitem documente pentru decontare. Adu cardul de sănătate la prima vizită și verificăm totul pentru tine.' },
    { q: 'Tratați și copii?', a: 'Sigur că da — ne ocupăm de toată familia. Primim copii de la 3 ani în sus, cu multă răbdare.' },
    { q: 'Mă doare o măsea, pot veni azi?', a: 'Păstrăm locuri pentru urgențe în fiecare zi. Lasă-mi datele tale și te sunăm imediat să te programăm cât mai repede.' },
  ],
  agency: 'WebStudio',
  contact: 'webstudio.outreach@gmail.com',
};

function decodeCfg() {
  try {
    const h = location.hash.slice(1);
    if (!h) return DEFAULT_CFG;
    const json = decodeURIComponent(escape(atob(h.replace(/-/g, '+').replace(/_/g, '/'))));
    return { ...DEFAULT_CFG, ...JSON.parse(json) };
  } catch (e) {
    return DEFAULT_CFG;
  }
}
const cfg = decodeCfg();

    bookPhone: n => `Mulțumesc, ${n}! Și cel mai bun număr de telefon pentru confirmare?`,
    bookDone: d => `Gata, ești programat(ă)! ✅\n\n📅 ${d.service}\n🗓 ${d.slot}\n👤 ${d.name} · ${d.phone}\n\nPrimești un SMS de confirmare în câteva minute. Te mai pot ajuta cu ceva?`,
    priceList: list => `Iată cele mai căutate servicii ale noastre:\n\n${list}\n\nVrei să te programez pentru unul dintre ele?`,
    hoursDay: 'Poți veni și fără programare, dar cu programare ai locul garantat.',
    hoursNight: 'Momentan suntem închiși — dar îți pot rezerva locul chiar acum, ca să nu mai aștepți la telefon dimineața.',
    humanAsk: b => `Desigur — voi ruga pe cineva de la ${b} să te sune. Cum te numești?`,
    thanks: 'Cu drag! 😊 Te mai pot ajuta cu ceva?',
    hi: 'Bună! Cu ce te pot ajuta azi?',
    other: 'Sigur — întreabă-mă orice! Prețuri, cum decurge o vizită, orice dorești.',
    fallback: o => `Bună întrebare — la asta îți poate răspunde cel mai bine ${o} direct. Scrie-mi exact ce vrei să afli și mă asigur că primești răspunsul personal, prin SMS. 👇`,
    msgGot: o => `Am notat — mă asigur că ${o} vede mesajul. Cum te numești?`,
    msgPhone: 'Și numărul de telefon la care te putem contacta?',
    msgDone: o => `Gata! ${o} îți va răspunde în scurt timp — de obicei în maximum o oră. Altceva?`,
    theTeam: 'echipa',
    wantsHuman: 'Dorește să vorbească cu o persoană',
    leadBooked: 'PROGRAMARE NOUĂ', leadQ: 'ÎNTREBARE — DE SUNAT ÎNAPOI', afterTag: 'DUPĂ PROGRAM',
    tomorrow: 'Mâine', days: ['Dum', 'Lun', 'Mar', 'Mie', 'Joi', 'Vin', 'Sâm'],
    times: ['9:30', '11:00', '14:15', '16:45'],
    ctaFallback: 'Leagă acest buton de emailul sau linkul tău de programări din Demo Factory.',
  },
};
const T = L[cfg.lang] || L.en;

/* ---------------- apply branding + static texts ---------------- */
document.documentElement.lang = cfg.lang;
document.documentElement.style.setProperty('--brand', cfg.color);
document.title = T.docTitle(cfg.biz);
const $ = id => document.getElementById(id);
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
$('tbLive').textContent = T.live;
$('tbTitle').innerHTML = T.tbTitle(esc(cfg.biz), esc(cfg.agency));
$('siteLogo').textContent = cfg.biz.trim()[0].toUpperCase();
$('siteName').textContent = cfg.biz;
$('siteTag').textContent = cfg.tag;
$('siteSvcTitle').textContent = T.services;
$('siteVisitTitle').textContent = T.visitUs;
$('chatBizName').textContent = cfg.biz;
$('chatStatus').textContent = T.statusOn;
$('chatInput').placeholder = T.inputPh;
$('opLookTitle').textContent = T.lookTitle;
$('ownerIntro').innerHTML = T.lookIntro(esc(cfg.biz));
$('stMsgsL').textContent = T.stMsgs;
$('stLeadsL').textContent = T.stLeads;
$('stRespL').textContent = T.stResp;
$('opPhoneTitle').textContent = T.phoneTitle;
$('leadEmpty').textContent = T.leadEmpty;
$('opWhyTitle').textContent = T.whyTitle;
$('opFacts').innerHTML = T.facts(T.factDay);
$('opNextTitle').textContent = T.nextTitle;
$('ctaText').innerHTML = T.ctaText(esc(cfg.agency));
$('ctaLink').textContent = T.ctaBtn;
$('hoursToggle').textContent = T.tryNight;
$('siteSvcs').innerHTML = cfg.services.map(s =>
  `<div class="svc"><b>${esc(s.n)}</b><span>${esc(s.p)}</span></div>`).join('');
$('siteMeta').innerHTML = `🕐 ${esc(cfg.hours)}<br>📍 ${esc(cfg.addr)}<br>📞 ${esc(cfg.phone)}`;
if (cfg.contact) {
  $('ctaLink').href = cfg.contact.includes('@') ? 'mailto:' + cfg.contact : cfg.contact;
} else {
  $('ctaLink').addEventListener('click', e => { e.preventDefault(); alert(T.ctaFallback); });
}

/* ---------------- after-hours mode ---------------- */
let afterHours = false;
$('hoursToggle').addEventListener('click', () => {
  afterHours = !afterHours;
  $('hoursToggle').textContent = afterHours ? T.backDay : T.tryNight;
  $('hoursToggle').classList.toggle('night', afterHours);
  $('chatStatus').textContent = afterHours ? T.statusNight : T.statusOn;
  $('factClosed').textContent = afterHours ? T.factNight : T.factDay;
  resetChat();
});

/* ---------------- chat engine ---------------- */
const msgsEl = $('msgs'), quickEl = $('quick'), inputEl = $('chatInput');
let stats = { msgs: 0, leads: 0 };
let flow = null;   // active multi-step flow: {type, step, data}
let busy = false;

function addMsg(text, who) {
  const d = document.createElement('div');
  d.className = 'msg ' + who;
  d.textContent = text;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot typing';
  d.innerHTML = '<i></i><i></i><i></i>';
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}
function botSay(text, delay) {
  return new Promise(res => {
    const t = showTyping();
    setTimeout(() => {
      t.remove();
      addMsg(text, 'bot');
      stats.msgs++;
      $('stMsgs').textContent = stats.msgs;
      res();
    }, delay ?? Math.min(500 + text.length * 9, 1600));
  });
}
function setQuick(opts) {
  quickEl.innerHTML = '';
  for (const o of opts) {
    const b = document.createElement('button');
    b.textContent = o.label;
    b.addEventListener('click', () => { if (!busy) handleUser(o.label, o.action); });
    quickEl.appendChild(b);
  }
}
const MAIN_QUICK = [
  { label: T.qBook, action: 'book' },
  { label: T.qPrice, action: 'pricing' },
  { label: T.qHours, action: 'hours' },
  { label: T.qOther, action: 'other' },
];

async function greet() {
  await botSay(afterHours ? T.greetNight(cfg.biz) : T.greetDay(cfg.biz));
  setQuick(MAIN_QUICK);
}
function resetChat() {
  msgsEl.innerHTML = '';
  quickEl.innerHTML = '';
  flow = null;
  greet();
}

/* ---- intent detection for free text (en + ro keywords) ---- */
function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
const KW = {
  book: ['book', 'appointment', 'schedule', 'reserve', 'slot', 'come in', 'availab',
         'programare', 'programez', 'programati', 'rezerv', 'rezervare', 'loc liber', 'disponibil', 'cand pot veni'],
  pricing: ['price', 'pricing', 'cost', 'how much', 'charge', 'fee', 'service', 'rate', 'menu',
            'pret', 'preturi', 'cat costa', 'cat e', 'cat este', 'tarif', 'servicii', 'oferta'],
  hours: ['hour', 'open', 'close', 'closing', 'when are you', 'address', 'where', 'location', 'parking', 'direction',
          'program', 'deschis', 'inchis', 'inchideti', 'deschideti', 'adresa', 'unde', 'locatie', 'parcare', 'orar'],
  human: ['human', 'real person', 'speak to', 'talk to', 'call me', 'someone call', 'a person',
          'om adevarat', 'persoana reala', 'vorbesc cu cineva', 'sa ma sune', 'suna-ma', 'sunati-ma', 'cu un om'],
  thanks: ['thank', 'thanks', 'awesome', 'perfect', 'cool', 'okay', 'ok',
           'multumesc', 'mersi', 'super', 'bine', 'am inteles'],
};
const GREET_RE = /^(hi|hello|hey|yo|sup|good (morning|afternoon|evening)|buna( ziua| seara| dimineata)?|salut|servus|hei|neata)\b/;

function detectIntent(raw) {
  const t = norm(raw);
  const has = (...ws) => ws.some(w =>
    new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/ +/g, '\\s+')).test(t));
  // FAQ scoring first (diacritics-insensitive word overlap)
  let best = null, bestScore = 0;
  for (const f of cfg.faqs) {
    const words = [...new Set(norm(f.q).split(/\W+/).filter(w => w.length > 3))];
    const score = words.filter(w => has(w)).length / Math.max(words.length, 1);
    if (score > bestScore) { bestScore = score; best = f; }
  }
  // a strong FAQ match beats generic intents — the prospect's own questions
  // are more specific than keywords like "programare"/"book"
  if (best && bestScore >= 0.6) return { faq: best };
  if (has(...KW.book)) return 'book';
  if (has(...KW.pricing)) return 'pricing';
  if (has(...KW.hours)) return 'hours';
  if (has(...KW.human)) return 'human';
  if (best && bestScore >= 0.34) return { faq: best };
  if (t.length < 30 && has(...KW.thanks)) return 'thanks';
  if (t.length < 25 && GREET_RE.test(t.trim())) return 'greet';
  return 'fallback';
}

/* ---- booking slots ---- */
function genSlots() {
  const out = [];
  const d = new Date();
  for (let i = 1; out.length < 3; i++) {
    const dd = new Date(d.getTime() + i * 86400000);
    if (dd.getDay() === 0) continue; // skip Sundays
    const label = (i === 1 ? T.tomorrow : T.days[dd.getDay()] + ' ' + dd.getDate() + '.' + (dd.getMonth() + 1));
    out.push(label + ', ' + T.times[out.length]);
  }
  return out;
}

/* ---- flows ---- */
async function startBooking() {
  flow = { type: 'book', step: 'service', data: {} };
  await botSay(T.bookAsk);
  setQuick(cfg.services.map(s => ({ label: s.n, action: 'pick_service' })).concat([{ label: T.somethingElse, action: 'pick_service' }]));
}
async function flowStep(text) {
  const f = flow;
  if (f.type === 'book') {
    if (f.step === 'service') {
      f.data.service = text;
      f.step = 'slot';
      const slots = genSlots();
      await botSay(afterHours ? T.slotsNight : T.slotsDay);
      setQuick(slots.map(s => ({ label: '🗓 ' + s, action: 'pick_slot' })));
    } else if (f.step === 'slot') {
      f.data.slot = text.replace('🗓 ', '');
      f.step = 'name';
      await botSay(T.bookName);
      setQuick([]);
    } else if (f.step === 'name') {
      f.data.name = text;
      f.step = 'phone';
      await botSay(T.bookPhone(text.split(' ')[0]));
    } else if (f.step === 'phone') {
      f.data.phone = text;
      flow = null;
      await botSay(T.bookDone(f.data));
      captureLead(T.leadBooked, `<b>${esc(f.data.name)}</b> · ${esc(f.data.phone)}<br>${esc(f.data.service)} — ${esc(f.data.slot)}`);
      setQuick(MAIN_QUICK);
    }
  } else if (f.type === 'msg') {
    if (f.step === 'question') {
      f.data.q = text;
      f.step = 'name';
      await botSay(T.msgGot(cfg.owner || T.theTeam));
      setQuick([]);
    } else if (f.step === 'name') {
      f.data.name = text;
      f.step = 'phone';
      await botSay(T.msgPhone);
    } else if (f.step === 'phone') {
      f.data.phone = text;
      flow = null;
      await botSay(T.msgDone(cfg.owner || T.theTeam));
      captureLead(T.leadQ, `<b>${esc(f.data.name)}</b> · ${esc(f.data.phone)}<br>"${esc(f.data.q)}"`);
      setQuick(MAIN_QUICK);
    }
  }
}

/* ---- main handler ---- */
async function handleUser(text, forcedAction) {
  if (busy || !text.trim()) return;
  busy = true;
  addMsg(text, 'user');
  inputEl.value = '';
  quickEl.innerHTML = '';
  try {
    if (flow) { await flowStep(text); return; }
    const intent = forcedAction && forcedAction !== 'pick_service' && forcedAction !== 'pick_slot'
      ? forcedAction : detectIntent(text);
    if (intent === 'book') {
      await startBooking();
    } else if (intent === 'pricing') {
      const list = cfg.services.map(s => `· ${s.n} — ${s.p}`).join('\n');
      await botSay(T.priceList(list));
      setQuick([{ label: T.qYesBook, action: 'book' }, { label: T.qNotNow, action: 'other' }]);
    } else if (intent === 'hours') {
      await botSay(`🕐 ${cfg.hours}\n📍 ${cfg.addr}\n\n${afterHours ? T.hoursNight : T.hoursDay}`);
      setQuick([{ label: T.qBook, action: 'book' }, { label: T.qAnother, action: 'other' }]);
    } else if (intent === 'human') {
      flow = { type: 'msg', step: 'name', data: { q: T.wantsHuman } };
      await botSay(T.humanAsk(cfg.biz));
    } else if (intent === 'thanks') {
      await botSay(T.thanks);
      setQuick(MAIN_QUICK);
    } else if (intent === 'greet') {
      await botSay(T.hi);
      setQuick(MAIN_QUICK);
    } else if (intent === 'other') {
      await botSay(T.other);
    } else if (intent && intent.faq) {
      await botSay(intent.faq.a);
      setQuick([{ label: T.qBook, action: 'book' }, { label: T.qAnother, action: 'other' }]);
    } else {
      // fallback — never lose the lead
      flow = { type: 'msg', step: 'question', data: {} };
      await botSay(T.fallback(cfg.owner || T.theTeam));
    }
  } finally {
    busy = false;
  }
}

/* ---- lead capture → owner panel ---- */
function captureLead(tag, html) {
  stats.leads++;
  $('stLeads').textContent = stats.leads;
  const feed = $('leadFeed');
  const empty = feed.querySelector('.lead-empty');
  if (empty) empty.remove();
  const d = document.createElement('div');
  d.className = 'lead';
  const time = new Date().toLocaleTimeString(cfg.lang === 'ro' ? 'ro-RO' : 'en-US', { hour: 'numeric', minute: '2-digit' });
  d.innerHTML = `<span class="tag">🔔 ${tag} · ${time}${afterHours ? ' · ' + T.afterTag : ''}</span>${html}`;
  feed.prepend(d);
}

/* ---- wiring ---- */
$('chatFab').addEventListener('click', () => $('chatWin').classList.add('open'));
$('chatClose').addEventListener('click', () => $('chatWin').classList.remove('open'));
$('send').addEventListener('click', () => handleUser(inputEl.value));
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleUser(inputEl.value); });

// auto-open the chat shortly after load — the demo should sell itself
setTimeout(() => { $('chatWin').classList.add('open'); greet(); }, 900);
</script>
